# HTTP server - redirect to HTTPS
server {
    listen 80;
    server_name localhost;
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name localhost;
    root /var/www/front/.output/public;
    index index.html index.htm;

    # SSL 证书配置
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS 头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Access log
    access_log /var/log/nginx/front.access.log;
    error_log /var/log/nginx/front.error.log;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # API 路由 - 直接转发到 Laravel
    location /api {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/backend/public;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    # 后台管理路由 - 直接转发到 Laravel
    location /admin {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/backend/public;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    # Fortify 认证路由 - 转发到 Laravel
    location ~ ^/(login|logout|register|forgot-password|reset-password|email|user/password|user/profile-information|user/two-factor-authentication|user/two-factor-recovery-codes|user/two-factor-qr-code|user/confirmed-password-status|user/confirm-password|sanctum) {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/backend/public;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    # 上传文件 (storage symlink)
    location /storage {
        root /var/www/backend/public;
        try_files $uri =404;
    }

    # 后端静态资源 (TinyMCE 等)
    location /vendor {
        root /var/www/backend/public;
        try_files $uri =404;
    }

    # Serve front-end files
    location / {
        root /var/www/front/.output/public;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
