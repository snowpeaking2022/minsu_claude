; Custom PHP configuration for ShuiYunGe

; Error reporting
error_reporting = E_ALL
display_errors = Off
log_errors = On
error_log = /var/log/php/errors.log

; Display startup errors
display_startup_errors = Off

; Memory
memory_limit = 256M

; Uploads
upload_max_filesize = 20M
post_max_size = 20M

; Sessions
session.gc_maxlifetime = 14400
session.save_path = "/tmp"

; Timezone
date.timezone = Asia/Shanghai

; Extensions
; Note: Some extensions are installed and enabled by default in the PHP Docker container
; pdo_mysql, mbstring, bcmath are already installed via Dockerfile
; extension = openssl  ; Not needed - installed by default in PHP 8.2
; extension = pdo_mysql  ; Already enabled via Dockerfile
; extension = mbstring  ; Already enabled via Dockerfile
; extension = tokenizer  ; Installed by default
; extension = xml  ; Installed by default
; extension = ctype  ; Installed by default
; extension = json  ; Installed by default
; extension = bcmath  ; Already enabled via Dockerfile

; Opcache
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000

; Xdebug (for development only)
; Note: Xdebug is not installed in the current Dockerfile
; To install Xdebug, add it to the Dockerfile and uncomment these lines
; zend_extension = xdebug
; xdebug.mode = debug,develop
; xdebug.client_host = host.docker.internal
; xdebug.client_port = 9003
; xdebug.start_with_request = yes
; xdebug.discover_client_host = yes

; Additional settings
max_execution_time = 60
realpath_cache_size = 4096k
realpath_cache_ttl = 120
