services:
  # PHP 8.2 (生产环境优化版)
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: shuiyunge-php
    restart: unless-stopped
    volumes:
      - ./backend:/var/www/backend:cached
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - php_logs:/var/www/backend/storage/logs
    depends_on:
      - mysql
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Nginx (生产环境优化版)
  nginx:
    image: nginx:alpine
    container_name: shuiyunge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/backend:ro
      - ./front:/var/www/front:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/logs:/var/log/nginx
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - php
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # MySQL 8.0 (生产环境优化版)
  mysql:
    image: mysql:8.0
    container_name: shuiyunge-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:3306:3306"  # 只绑定到本地接口
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword123}
      MYSQL_DATABASE: shuiyunge
      MYSQL_USER: shuiyunge_user
      MYSQL_PASSWORD: ${DB_PASSWORD:-WaterCloud2026!}
    command: --default-authentication-plugin=mysql_native_password
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M

  # Redis (生产环境优化版)
  redis:
    image: redis:alpine
    container_name: shuiyunge-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"  # 只绑定到本地接口
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

volumes:
  mysql_data:
  redis_data:
  php_logs:
